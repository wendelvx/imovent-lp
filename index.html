<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 1. Otimização de Performance (Core Web Vitals) -->
    <!-- Pré-conecta com os servidores do Google Fonts para a página carregar milissegundos mais rápido -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- 2. Identidade Visual do Navegador -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> <!-- Dica: Salve a letra "I" branca no fundo índigo como SVG e coloque na pasta public -->
    <meta name="theme-color" content="#4f46e5" /> <!-- Pinta a barra de endereço do Chrome no celular no seu indigo-600 -->

    <!-- 3. SEO Primário (A isca para o Google) -->
    <!-- Título de impacto, entre 50-60 caracteres para não cortar no Google -->
    <title>Imovent | O 1º Motor de Vendas para Corretores de Imóveis</title>
    <!-- A Meta Description é o argumento de venda na página de busca. Foque na dor. -->
    <meta name="description" content="Pare de perder dinheiro no WhatsApp. O Imovent é o único sistema que integra funil de vendas nativo, automação para Marketplace e Studio Criativo imobiliário." />
    <!-- Palavras-chave exatas que o corretor digita quando está frustrado -->
    <meta name="keywords" content="CRM imobiliário, sistema para corretores, automação imobiliária, funil de vendas corretor, postador automático marketplace, imovent, gestão imobiliária" />
    <meta name="author" content="Imovent Tecnologia" />
    <meta name="robots" content="index, follow" />

    <!-- 4. Open Graph / Meta Tags Sociais (CRUCIAL PARA O WHATSAPP) -->
    <!-- Isso é o que define o "Card" gerado quando você envia o link para alguém -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.imovent.com.br/" /> <!-- Atualize com seu domínio oficial -->
    <meta property="og:title" content="Imovent | Transforme seu WhatsApp em uma esteira de vendas." />
    <meta property="og:description" content="Recupere leads esquecidos, escale sua receita e publique anúncios automaticamente. Teste grátis hoje." />
    <meta property="og:image" content="https://www.imovent.com.br/og-image.jpg" /> <!-- CRUCIAL: Imagem de 1200x630px para o card do WhatsApp -->

    <!-- 5. Twitter Meta Tags (Usado também por outros mensageiros) -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.imovent.com.br/" />
    <meta property="twitter:title" content="Imovent | O 1º Motor de Vendas Imobiliário" />
    <meta property="twitter:description" content="Pare de perder dinheiro com leads esfriando no WhatsApp. O motor de vendas focado em lucro para o mercado imobiliário." />
    <meta property="twitter:image" content="https://www.imovent.com.br/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
